<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../css/style-consultas.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
   <header>
    <img class="imagen-portada" src="./PORTADA2.jpg" alt="portada">

    <h1 class="titulo-principal"> Bienvenidos a Damont Estetica Vehícular</h1>
  </header>
  <nav>
    <ul class="menu">
      <li class="item-menu"><a href="https://www.youtube.com/">Inicio</a></li>
      <li class="item-menu">Galeria</li>
      <li class="item-menu">Consultas</li>
      <li class="item-menu">servicio</li>
      <li class="item-menu">Contacto</li>
    </ul>

  </nav>

  <main>
    <h2 class="titulos-secundarios">Dejanos tu consulta</h2>
    <form>
      <div class="contenedor-formulario">
        <div class="formulario">
          <label for="vehiculo">¿Que vehículo tenes?</label>
          <input type="text" id="vehiculo" name="vehiculo" placeholder="Vw gol, Ford ka, etc"><br>
        </div>

          <div class="formulario">
            <label for="color">¿Que color es?</label>
            <input type="text" id="color" name="color vehiculo" placeholder="Negro, banco, etc"><br>
          </div>

          <div class="formulario">
            <label for="modelo">¿Que que modelo es?</label><br>
            <input type="number" id="modelo" name="modelo vehiculo" placeholder="1995, 2010, etc"><br>
          </div>


          <div class="formulario">
            <label for="foto">Deje aqui una foto de tu vehículo (opcional)</label><br>
            <input type="file" name="foto" id="foto">
          </div>



          <div class="formulario">
            <label>¿Que servicio te interesa?</label><br>
            <input type="checkbox" id="pulido" name="pulido">
            <label for="pulido">Pulido</label><br>
            <input type="checkbox" id="limpieza" name="limpieza">
            <label for="limpieza">Limpieza de interior</label><br>
            <input type="checkbox" id="Polarizado" name="Polarizado">
            <label for="Polarizado">Polarizado</label><br>
            <input type="checkbox" id="Pulido-de-opticas" name="Pulido-de-opticas">
            <label for="Pulido-de-opticas">Pulido de opticas</label><br>
          </div>
        
          <h5>Dejanos algun detalle que te interese contarnos de tu vehículo</h5>
          <textarea name="comentario" id="comentario"
            placeholder="Necesito limpiar alfobra de base porque me ingreso agua adentro del vehículo" rows="10"
            cols="50"></textarea>

          <h4>Dejanos tus datos para comunicarnos con vos</h4>

          <div><label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" required placeholder="Escribe aquí..."><br>

          <label for="apellido">Apellido:</label>
          <input type="text" id="apellido" name="apellido" required placeholder="Escribe aquí..."><br>

          <label for="email">Email:</label>
          <input type="email" id="email" name="userEmail" required placeholder="tu@email.com"><br>

          <label for="telefono">Telefono</label>
          <input type="number" id="telefono" name="telefono" placeholder="3525662288"></div><br>
          


          <label for="horario">¿En que horario te gustaria que nos comuniquemos?</label>
          <select id="horario" name="horario">
            <option value="mañana">Mañana</option>
            <option value="tarde">Tarde</option>
            <option value="noche">Noche</option>
          </select><br>
          <button class="boton-enviar" type="submit">Enviar</button>
      </div>
        </form>

  </main>

    <footer>
    <a href="https://wa.me/message/RW7VMYCQZSYLE1" target="_blank" class="whatsapp-btn">
      <i class="fa-brands fa-whatsapp"></i>
    </a>
    
    <a href="https://www.instagram.com/damont_esteticavehicular/"target="_blank" class="instagram-btn">
      <i class="fa-brands fa-instagram"></i>
    </a>
    
    <a href="https://www.facebook.com/damont.colonia.caroya.2025?locale=es_LA"target="_blank" class="facebook-btn">
      <i class="fa-brands fa-facebook"></i>
    </a>

   


  </footer>
</body>
</html>
